apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weatherapp-api-monitor
  namespace: monitoring        # must be in monitoring namespace — that's where Prometheus lives
  labels:
    release: kube-prometheus-stack  # must match the Helm release name — Prometheus Operator finds it by this
spec:
  namespaceSelector:
    matchNames:
      - weatherapp             # look for services in the weatherapp namespace
  selector:
    matchLabels:
      app: weatherapp-api      # matches metadata.labels.app in api-service.yaml
  endpoints:
  - port: http                 # named port from api-service.yaml (name: http, port: 80 → 8080)
    path: /metrics
    interval: 15s
