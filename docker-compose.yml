version: '3.8'

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "WeatherApp@123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "WeatherApp@123", "-Q", "SELECT 1", "-No"]
      interval: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5050:8080"
    environment:
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=WeatherAppDb;User Id=sa;
        Password=WeatherApp@123;TrustServerCertificate=True;
      OpenWeatherMap__ApiKey: "${OWM_API_KEY}"
      OpenWeatherMap__BaseUrl: "https://api.openweathermap.org/data/2.5"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:5050"
    ports:
      - "3000:80"
    depends_on:
      - api
