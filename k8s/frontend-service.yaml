apiVersion: v1
kind: Service
metadata:
  name: weatherapp-frontend-svc
  namespace: weatherapp
spec:
  selector:
    app: weatherapp-frontend    # routes traffic to pods with this label
  ports:
  - name: http
    port: 80                    # Service listens on 80
    targetPort: 80              # forwards to pod port 80 (nginx)
  type: ClusterIP               # internal only — Ingress handles external traffic
