trigger:
  branches:
    include:
      - main


pool:
  vmImage: 'ubuntu-latest'

variables:
  imageTag: '$(Build.BuildId)'

# Stage 1 Build and test
stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Backend
    displayName: 'Backend'
    steps:
    # pin the sdk version
    - task: UseDotNet@2
      displayName: 'Use .NET 9'
      inputs:
        packageType: 'sdk'
        version: '9.x'
    # restore nuget packages
    - script: dotnet restore
      workingDirectory: backend
      displayName: 'Restore Backend'

      # compile in release mode. --no-restore reuses the packages from prev step
    - script: dotnet build --no-restore --configuration Release
      workingDirectory: backend
      displayName: 'Build dotnet'

      # run unit tests. --no-build reuses binaries
      # --loggertrx writes results in vstest format for publish test
      # non zero exit from a failed test stops pipeline.
    - script: |
        dotnet test --no-build --configuration Release \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/test-results
      workingDirectory: backend
      displayName: 'dotnet test (gate)'

    #publish .trx test so devops show pass/fail and test details
    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/test-results/*.trx'

# stage 2: docker build and push
# build docker images for api and frontend and push to acr
# variables will come from variable group

- stage: DockerBuild
  displayName: 'Build and Push Docker Images'
  dependsOn: Build
  condition: succeeded()
  variables:
    - group: weatherapp-vars-dev # acr login, acr username and acr password live here
  jobs:
  - job: BuildAndPush
    displayName: 'Build api and frontend images'
    steps:
    - script: |
          docker login $(ACR_LOGIN_SERVER) \
            --username $(ACR_USERNAME) \
            --password $(ACR_PASSWORD)
      displayName: 'Login to ACR'

      # build api image from backend/Dockerfile
      # two tags are pushed:
      # :$(imageTag) - imutable tied to build, used by deployments
      # :latest - convenience pointer, always points to latest build
    - script: |
          docker buildx build \
            --platform linux/amd64 \
            -t $(ACR_LOGIN_SERVER)/weatherapp-api:$(imageTag) \
            -t $(ACR_LOGIN_SERVER)/weatherapp-api:latest \
            --push \
            backend/
      displayName: 'Build and Push API image'
      env:
        DOCKER_BUILDKIT: '1'

      # build frontend image from frontend/Dockerfile
      # vite_api_base_url is needed at build time for the frontend to know where the api is
    - script: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=$(VITE_API_BASE_URL) \
            -t $(ACR_LOGIN_SERVER)/weatherapp-frontend:$(imageTag) \
            -t $(ACR_LOGIN_SERVER)/weatherapp-frontend:latest \
            --push \
            frontend/
      displayName: 'Build and Push Frontend image'
      env:
        DOCKER_BUILDKIT: '1'

# ─── STAGE 3: DEPLOY → DEV ───────────────────────────────────────────────────
# Purpose: deploy the freshly-built images to the AKS dev cluster.
# Only runs if Stage 2 (Docker build + push) succeeded.
- stage: DeployDev
  displayName: 'Deploy to Dev'
  dependsOn: DockerBuild
  condition: succeeded()
  variables:
    - group: weatherapp-vars-dev   # AKS_RESOURCE_GROUP, AKS_CLUSTER_NAME, secrets live here
  jobs:

  # 'deployment' (not 'job') gives environment tracking, approval gates,
  # and deployment history in Azure DevOps.
  - deployment: DeployDev
    displayName: 'Deploy to AKS Dev'
    environment: 'aks-dev'        # links to the aks-dev environment in Azure DevOps
    strategy:
      runOnce:                    # run steps once — no canary or blue/green here
        deploy:
          steps:

          # Deployment jobs do NOT auto-checkout the repo unlike regular jobs.
          # Without this the k8s/ folder is missing and kubectl apply -f k8s/ fails.
          - checkout: self

          # All kubectl commands are inside one AzureCLI@2 task.
          # Reason: az aks get-credentials writes auth to ~/.kube/config.
          # That auth context is not guaranteed to survive across separate steps.
          # One task = one shell = context always valid.
          - task: AzureCLI@2
            displayName: 'Deploy to AKS'
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e   # stop immediately if any command exits non-zero

                # Pull AKS credentials onto the agent so kubectl knows which
                # cluster to talk to. --overwrite-existing handles re-runs safely.
                az aks get-credentials \
                  --resource-group $(AKS_RESOURCE_GROUP) \
                  --name $(AKS_CLUSTER_NAME) \
                  --overwrite-existing

                # Apply namespace first — everything else lives inside it.
                # ConfigMap holds non-secret env vars (URLs, env name).
                kubectl apply -f k8s/namespace.yaml
                kubectl apply -f k8s/configmap.yaml

                # Create the Kubernetes Secret from Variable Group values.
                # --dry-run=client -o yaml | kubectl apply -f - is idempotent:
                #   - secret missing → creates it
                #   - secret exists  → updates it
                # Never commit a secret.yaml — this command IS the secret.
                kubectl create secret generic weatherapp-secrets \
                  --from-literal=sql-connection-string="$(SQL_CONNECTION_STRING)" \
                  --from-literal=owm-api-key="$(OWM_API_KEY)" \
                  --namespace weatherapp \
                  --dry-run=client -o yaml | kubectl apply -f -

                # Services and Ingress are stable — safe to apply every run.
                kubectl apply -f k8s/api-service.yaml
                kubectl apply -f k8s/frontend-service.yaml
                kubectl apply -f k8s/ingress.yaml

                # Replace placeholders in-stream — no files on disk are modified.
                # kubectl apply -f - means kubectl reads the result from stdin.
                sed -e 's/IMAGE_TAG/$(imageTag)/g' \
                    -e 's|ACR_LOGIN_SERVER|$(ACR_LOGIN_SERVER)|g' \
                    k8s/api-deployment.yaml | kubectl apply -f -

                sed -e 's/IMAGE_TAG/$(imageTag)/g' \
                    -e 's|ACR_LOGIN_SERVER|$(ACR_LOGIN_SERVER)|g' \
                    k8s/frontend-deployment.yaml | kubectl apply -f -

                # Block until both rolling updates finish.
                # --timeout=5m fails the pipeline if pods don't become healthy in time.
                kubectl rollout status deployment/weatherapp-api \
                  -n weatherapp --timeout=5m
                kubectl rollout status deployment/weatherapp-frontend \
                  -n weatherapp --timeout=5m

                # Give Ingress a moment to register the new pods, then smoke test.
                # curl -f exits non-zero on HTTP 4xx/5xx — without -f curl returns 0
                # even on a 503, hiding a broken deploy.
                sleep 15
                curl -f --max-time 30 http://$(INGRESS_EXTERNAL_IP)/api/health
                echo "Smoke test passed"