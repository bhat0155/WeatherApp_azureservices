trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: Backend
    displayName: 'Backend'
    steps:
    - task: UseDotNet@2
      displayName: 'Use .NET 9'
      inputs:
        packageType: 'sdk'
        version: '9.x'

    - script: dotnet restore
      workingDirectory: backend
      displayName: 'Restore Backend'

    - script: dotnet build --no-restore --configuration Release
      workingDirectory: backend
      displayName: 'Build dotnet'

    - script: |
        dotnet test --no-build --configuration Release \
          --logger trx \
          --results-directory $(Agent.TempDirectory)/test-results
      workingDirectory: backend
      displayName: 'dotnet test (gate)'

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/test-results/*.trx'

    - script: |
        dotnet publish WeatherApp.Api/WeatherApp.Api.csproj \
          --no-build --configuration Release \
          --output $(Build.ArtifactStagingDirectory)/api
      workingDirectory: backend
      displayName: 'dotnet publish'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
        ArtifactName: 'api'

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: succeeded()
  variables: 
    - group: weatherapp-vars-dev
  jobs:
  - deployment: API
    displayName: 'Deploy API to Development'
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy API'
            inputs:
              azureSubscription: 'azure-service-connection'
              appType: webAppLinux
              appName: $(API_APP_NAME)
              package: '$(Pipeline.Workspace)/api'
              appSettings: >-
                -ConnectionStrings__DefaultConnection "$(SQL_CONNECTION_STRING)"
                -OpenWeatherMap__ApiKey "$(OWM_API_KEY)"
                -OpenWeatherMap__BaseUrl "https://api.openweathermap.org/data/2.5"
                -AllowedOrigins__0 "$(FRONTEND_URL)"
    
  - deployment: Frontend
    displayName: 'Frontend → weatherapp-frontend-dev'
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'npm ci'

          - script: npm run build
            workingDirectory: frontend
            displayName: 'npm run build'
            env:
              VITE_API_BASE_URL: $(VITE_API_BASE_URL)

          - task: AzureStaticWebApp@0
            displayName: 'Deploy frontend'
            inputs:
              app_location: 'frontend/dist'
              skip_app_build: true
              output_location: ''
              azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)

# ─── STAGE 3: DEPLOY → STAGING ───────────────────────────────────────────────
- stage: DeployStaging
  displayName: 'Deploy → Staging'
  dependsOn: DeployDev
  condition: succeeded()
  variables:
  - group: weatherapp-vars-staging
  jobs:

  - deployment: API
    displayName: 'API → weatherapp-api-staging'
    environment: staging
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy API'
            inputs:
              azureSubscription: 'azure-service-connection'
              appType: webAppLinux
              appName: $(API_APP_NAME)
              package: '$(Pipeline.Workspace)/api'
              appSettings: >-
                -ConnectionStrings__DefaultConnection "$(SQL_CONNECTION_STRING)"
                -OpenWeatherMap__ApiKey "$(OWM_API_KEY)"
                -OpenWeatherMap__BaseUrl "https://api.openweathermap.org/data/2.5"
                -AllowedOrigins__0 "$(FRONTEND_URL)"

  - deployment: Frontend
    displayName: 'Frontend → weatherapp-frontend-staging'
    environment: staging
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'npm ci'

          - script: npm run build
            workingDirectory: frontend
            displayName: 'npm run build'
            env:
              VITE_API_BASE_URL: $(VITE_API_BASE_URL)

          - task: AzureStaticWebApp@0
            displayName: 'Deploy frontend'
            inputs:
              app_location: 'frontend/dist'
              skip_app_build: true
              output_location: ''
              azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)

# ─── STAGE 4: DEPLOY → PROD (approval gate) ──────────────────────────────────
- stage: DeployProd
  displayName: 'Deploy → Production'
  dependsOn: DeployStaging
  condition: succeeded()
  variables:
  - group: weatherapp-vars-prod
  jobs:

  - deployment: API
    displayName: 'API → weatherapp-api-prod'
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy API'
            inputs:
              azureSubscription: 'azure-service-connection'
              appType: webAppLinux
              appName: $(API_APP_NAME)
              package: '$(Pipeline.Workspace)/api'
              appSettings: >-
                -ConnectionStrings__DefaultConnection "$(SQL_CONNECTION_STRING)"
                -OpenWeatherMap__ApiKey "$(OWM_API_KEY)"
                -OpenWeatherMap__BaseUrl "https://api.openweathermap.org/data/2.5"
                -AllowedOrigins__0 "$(FRONTEND_URL)"

  - deployment: Frontend
    displayName: 'Frontend → weatherapp-frontend-prod'
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: NodeTool@0
            displayName: 'Use Node 20'
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            workingDirectory: frontend
            displayName: 'npm ci'

          - script: npm run build
            workingDirectory: frontend
            displayName: 'npm run build'
            env:
              VITE_API_BASE_URL: $(VITE_API_BASE_URL)

          - task: AzureStaticWebApp@0
            displayName: 'Deploy frontend'
            inputs:
              app_location: 'frontend/dist'
              skip_app_build: true
              output_location: ''
              azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)
